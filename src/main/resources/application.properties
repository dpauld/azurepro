spring.application.name=azurepro

# ==========================================
# 1. Azure Key Vault Configuration
# ==========================================
# Replace with your actual Key Vault URI after creating it
spring.cloud.azure.keyvault.secret.endpoint=https://kv-azurepro-test.vault.azure.net/
spring.config.import=optional:azure-keyvault://kv-azurepro-test.vault.azure.net/
#->>>>Helped by: https://gemini.google.com/share/97dab1002c2b
#->>>>Helped by(solved the issue of using azure secret): https://claude.ai/share/b62e3f1a-dda7-488c-aa4f-fa619282d125

# ==========================================
# 2. Database Configuration (Ultra Cheap Tier)
# ==========================================
# Azure Key Vault automatically overrides the placeholder below
# by searching for a secret named "my-db-password" inside your vault.
#spring.datasource.url=jdbc:postgresql://db-cheap-test-eastus.postgres.database.azure.com:5432/testdb
spring.datasource.url=jdbc:sqlserver://sql-azurepro-test.database.windows.net:1433;databaseName=db-azurepro-test;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
spring.datasource.username=dbadmin
spring.datasource.password=${my.db.password}

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# FIX: Speak the correct dialect language for Microsoft SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect