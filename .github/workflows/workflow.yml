name: Build and Deploy Spring Boot to Azure

on:
  push:
    branches:
      - main # Change this if your default branch is named 'master'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the Java JDK environment
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Change to '11' or '21' if your Spring project uses a different Java version
          distribution: 'temurin'
          cache: 'maven'

      # 3. Build and package the executable JAR file
      - name: Build with Maven
        run: mvn clean package -DskipTests # Skips tests to speed up deployment; remove '-DskipTests' if you want tests to run

      # 4. Deploy the compiled package to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-azurepro-test' # REPLACE THIS with your actual Azure App Service name
          publish-profile: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
          package: 'target/*.jar' # Locates the built Spring Boot JAR file in the target directory

